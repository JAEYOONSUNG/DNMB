version: "3.9"

services:
  dnmb:
    build:
      context: .
      dockerfile: Dockerfile
    image: dnmb:latest
    container_name: dnmb
    volumes:
      # GenBank files + input data
      - ./data:/data
      # Output directory
      - ./results:/results
      # DB cache — shared between Docker and local R
      # Both use the same directory, so DBs are downloaded only ONCE
      - ~/.dnmb-cache:/opt/dnmb/cache
    environment:
      - DNMB_CACHE_ROOT=/opt/dnmb/cache
    working_dir: /data

    # ── Usage examples ──
    # Interactive R:
    #   docker compose run dnmb R
    #
    # Full pipeline (all modules ON):
    #   docker compose run dnmb Rscript -e "
    #     library(DNMB);
    #     run_DNMB(
    #       module_EggNOG       = TRUE,
    #       module_InterProScan = TRUE,
    #       module_dbCAN        = TRUE,
    #       module_MEROPS       = TRUE,
    #       module_CLEAN        = TRUE,
    #       module_PAZy         = TRUE,
    #       module_GapMind      = TRUE,
    #       module_DefenseFinder= TRUE,
    #       module_REBASEfinder = TRUE,
    #       module_ISelement    = TRUE,
    #       module_Prophage     = TRUE
    #     )"
    #
    # Bash shell:
    #   docker compose run dnmb bash
    command: ["R"]
